<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <style>
        body {
            font-family: Arial;
            background: #e3f2fd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        form{
            color: blue;
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 300px;
        }
        button {
            background-color:  rgb(5, 189, 250);
            width: 100%;
            padding: 10px 0;
            margin-top: 10px;
        }
        button:hover {
            background-color: rgb(0, 225, 255);
        }
        input{
            width: 99%;
            padding: 10px 0;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <form action="/api/student_login" method="get">
        <h2>Student Login</h2>
        <input type="email" name="email" placeholder="Email" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <button>Login</button>
    </form>

</body>
</html>
