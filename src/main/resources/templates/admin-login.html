<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial;
            background: #e3f2fd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            color: blue;
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 300px;
        }
        button{
            background-color: rgb(5, 189, 250);
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: rgb(0, 225, 255);
        }

        input{
            width: 92%;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <form action="/api/admin_login" method="get">
        <h1>Admin Login</h1>
        <input type="email" name="email" placeholder="Email" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <button>Login</button>
    </form>

</body>
</html>
